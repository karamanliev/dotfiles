# Theme
source-file $XDG_CONFIG_HOME/tmux/themes/current_theme.conf

## Status
set -g status-justify left
set -g status-style "#{?client_prefix,fg=#{accent_active},fg=#{accent}} bg=#{bg_color}"
set -g status-left ""

## Modules right
set -g status-right "#(sh ~/.config/tmux/scripts/netbird-status.sh)#(sh ~/.config/tmux/scripts/clam-status.sh)#(sh ~/.config/tmux/scripts/battery-status.sh)#[default] #[fg=#{fg_color}]#H  #[default] #[fg=#{fg_color}]#S "
set -g status-right-length 100

## Windows left
set -g status-left-length 0
setw -g window-status-current-style "fg=#{bg_color} #{?client_prefix,bg=#{accent_active},bg=#{accent}}"
setw -g window-status-current-format " #I #W#{?window_zoomed_flag, <  ,} "
setw -g window-status-format " #[#{?client_prefix,fg=#{accent_active},fg=#{accent}}]#I #[fg=#{fg_color}]#W #F"
setw -g window-status-bell-style "fg=#{alert_color} bg=#{bg_color} bold"

## Pane borders
set -g pane-border-style "fg=#{border_color}"
set -g pane-active-border-style "fg=#{accent_active}"

## Misc
### clock mode
setw -Fg clock-mode-colour "#{accent_active}"
### pane number display
set-option -Fg display-panes-active-colour "#{accent_active}"
set-option -Fg display-panes-colour "#{border_color}"
### leader + r
setw -g mode-style "fg=#{bg_color} bg=#{accent_active}"
### messages
set -g message-style "fg=#{accent} bg=#{bg_alt_color}"
