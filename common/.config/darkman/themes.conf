# Unified light/dark theme mapping used by Sunsetr, Darkman hooks and shell env.
# Keep this file as the single source of truth for theme names.

# Neovim/kitty/vivid theme IDs
LIGHT_THEME="catppuccin-latte"
DARK_THEME="catppuccin-macchiato"

# GTK settings
LIGHT_GTK_THEME="adw-gtk3"
DARK_GTK_THEME="adw-gtk3-dark"
LIGHT_GTK_ICON_THEME="Papirus-Dark"
DARK_GTK_ICON_THEME="Papirus-Dark"

# Optional compositor transition when mode changes
ENABLE_NIRI_TRANSITION="1"
NIRI_TRANSITION_DELAY_MS="500"
